pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(rootDir.absolutePath + "/local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def flutterSdkPathValue = properties.getProperty("flutter.sdk")
        if (flutterSdkPathValue == null) {
            throw new GradleException("flutter.sdk not set in local.properties")
        }
        return flutterSdkPathValue
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "3.41.6" apply false
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
