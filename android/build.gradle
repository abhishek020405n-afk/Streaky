allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDeps(rootProject.childrenDependingOn(project.name))
}

subprojects {
    project.afterEvaluate {
        project.java.toolchain.languageVersion.set(JavaLanguageVersion.of(11))
    }
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
